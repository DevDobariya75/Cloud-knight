<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Account - Haunted Cloud App</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ── Navigation ── -->
  <nav>
    <a href="/" class="nav-brand">👻 HauntedCloud</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/login">Login</a></li>
      <li><a href="/register">Register</a></li>
      <li><a href="/verify">Verify</a></li>
    </ul>
  </nav>

  <!-- ── Main Content ── -->
  <main class="page">
    <div class="card">

      <!-- Icon -->
      <span class="ghost-float" style="font-size:3.5rem;">✅</span>

      <!-- Title -->
      <h1 class="page-title" style="font-size:2.2rem; color: var(--green);">
        Verify Your Account
      </h1>

      <p class="page-subtitle">
        <strong>Two-factor protection activated!</strong><br/>
        <span style="font-size:0.85rem; color:var(--text-muted); margin-top: 8px; display: block;">Check your email for the mystical code...</span>
      </p>

      <!-- ── VERIFY FORM ── -->
      <!--
        This form currently does NOTHING real.
        It calls handleVerifyOtp(), which is a workshop stub.
        Students will replace it with AWS Cognito confirmSignUp.
      -->
      <form onsubmit="handleVerifyOtp(event)">
        <div class="form-group">
          <label for="otpCode">🔢 OTP Verification Code</label>
          <input
            type="text"
            id="otpCode"
            name="otpCode"
            placeholder="123456"
            inputmode="numeric"
            minlength="6"
            maxlength="6"
            pattern="[0-9]{6}"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">
          Verify OTP →
        </button>
      </form>
    </div>
  </main>

  <!-- ── Footer ── -->
  <footer>
    👻 Haunted Cloud App &mdash; AWS Workshop &mdash; Built for brave developers
  </footer>

  <!-- Load auth stub first, then main.js -->
  <script src="/js/auth.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
